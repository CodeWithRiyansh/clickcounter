<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riyansh UPS Tracker - Final Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Oswald:wght@600&family=Share+Tech+Mono&display=swap');
        
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0;
            --ups-gold: #ffb500; --neon-green: #39FF14; --alert-red: #ff3131;
        }

        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; }

        /* Status Ticker */
        .header-ticker { position: absolute; top: 15px; width: 90%; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 50px; border: 1px solid var(--ups-gold); text-align: center; font-family: 'Share Tech Mono', monospace; font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; transition: 0.3s; }
        .dot-green { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); animation: pulse 1.5s infinite; }
        .dot-red { background: var(--alert-red); box-shadow: 0 0 10px var(--alert-red); }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Main Dashboard Card */
        .dashboard-card { background: var(--card-bg); width: 450px; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8); border-top: 8px solid var(--ups-gold); position: relative; }

        .cph-display { position: absolute; top: 15px; right: 20px; font-family: 'Oswald'; color: var(--ups-gold); font-size: 14px; }

        .main-count h1 { font-family: 'Oswald', sans-serif; font-size: 100px; margin: 10px 0; line-height: 0.9; color: var(--ups-gold); }
        .label { font-size: 12px; color: #888; font-weight: bold; letter-spacing: 2px; }

        /* Counters Section (Email/Call) */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; border: 1px solid #333; }
        .stat-val { display: block; font-family: 'Oswald'; font-size: 28px; color: #fff; }

        /* Break Buttons */
        .break-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .break-btn { background: #333; border: none; color: #aaa; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .break-btn.active { background: var(--alert-red); color: white; box-shadow: 0 0 15px rgba(255,49,49,0.4); }

        /* Action Buttons */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; transition: 0.2s; }
        .btn-work { background: var(--ups-gold); color: #121212; grid-column: span 2; font-size: 18px; margin-bottom: 5px; box-shadow: 0 4px 0 #b38000; }
        .btn-res { background: #2a2a2a; color: #ddd; border: 1px solid #444; }
        .btn:active { transform: translateY(2px); box-shadow: none; }

        #timer-text { font-family: 'Share Tech Mono'; color: var(--alert-red); font-size: 18px; margin-bottom: 10px; display: none; }

        .toast { position: fixed; top: -200px; left: 50%; transform: translateX(-50%); background: #222; color: var(--ups-gold); padding: 15px 30px; border-radius: 10px; border: 1px solid var(--ups-gold); transition: 0.6s; z-index: 1000; text-align: center; width: 300px; }
        .toast.active { top: 30px; }
    </style>
</head>
<body>

    <div class="header-ticker">
        <div id="live-dot" class="status-dot dot-green"></div>
        <span id="ticker-text">STATUS: WORKING | TARGET: 310</span>
        <span id="clock" style="color:var(--ups-gold)">00:00:00</span>
    </div>

    <div class="dashboard-card">
        <div class="cph-display">CPH: <span id="cph-val">0</span></div>

        <div id="timer-text">ON BREAK: <span id="b-clock">00:00</span></div>

        <div class="main-count">
            <span class="label">ACTUAL WORK ITEMS</span>
            <h1 id="utcDisp">0</h1>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <span class="label">EMAIL RESCHED</span>
                <span class="stat-val" id="eDisp">0</span>
            </div>
            <div class="stat-box">
                <span class="label">CALL RESCHED</span>
                <span class="stat-val" id="cDisp">0</span>
            </div>
        </div>

        <div class="break-grid">
            <button class="break-btn" id="l-btn" onclick="startBreak(30, 'l-btn')">LUNCH (30m)</button>
            <button class="break-btn" id="b1-btn" onclick="startBreak(15, 'b1-btn')">BRK 1 (15m)</button>
            <button class="break-btn" id="b2-btn" onclick="startBreak(15, 'b2-btn')">BRK 2 (15m)</button>
        </div>

        <div class="action-grid">
            <button class="btn btn-work" onclick="logWork()">SHIP ITEM +1</button>
            <button class="btn btn-res" onclick="logOther('email')">Email</button>
            <button class="btn btn-res" onclick="logOther('call')">Call/VM</button>
            <button class="btn btn-res" style="grid-column: span 2; background:var(--bg-color)" onclick="downloadReport()">Download Excel Report</button>
        </div>

        <p style="font-size: 10px; color: #555; cursor: pointer; margin-top: 15px;" onclick="resetAll()">Reset All Data</p>
    </div>

    <div id="toast" class="toast"><b id="tTitle"></b><p id="tMsg" style="margin:5px 0 0;"></p></div>

    <script>
        let data = localStorage.getItem('rta_v4') ? JSON.parse(localStorage.getItem('rta_v4')) : {
            utc: 0, email: 0, call: 0, target: 310, start: Date.now()
        };

        let breakInterval = null;

        function logWork() {
            if (breakInterval) { showToast("Oye Sher!", "Break pe ho, login toh karlo!"); return; }
            data.utc++;
            handleMotivation();
            save();
        }

        function logOther(type) {
            if (type === 'email') data.email++; else data.call++;
            showToast("Logged", `${type} record ho gaya.`);
            save();
        }

        function startBreak(mins, btnId) {
            const dot = document.getElementById('live-dot');
            const ticker = document.getElementById('ticker-text');
            const timerDiv = document.getElementById('timer-text');

            if (breakInterval) {
                clearInterval(breakInterval);
                breakInterval = null;
                document.querySelectorAll('.break-btn').forEach(b => b.classList.remove('active'));
                timerDiv.style.display = 'none';
                dot.className = 'status-dot dot-green';
                ticker.innerText = `STATUS: WORKING | REMAINING: ${data.target - data.utc}`;
                showToast("Welcome Back!", "Chalo kaam pe lag jao.");
                return;
            }

            // Start Break Logic
            let sec = mins * 60;
            document.getElementById(btnId).classList.add('active');
            timerDiv.style.display = 'block';
            dot.className = 'status-dot dot-red';
            ticker.innerText = "STATUS: ON BREAK (OFFLINE)";

            breakInterval = setInterval(() => {
                sec--;
                let m = Math.floor(sec / 60);
                let s = sec % 60;
                document.getElementById('b-clock').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (sec <= 0) document.getElementById('b-clock').innerText = "LIMIT EXCEEDED!";
            }, 1000);
        }

        function handleMotivation() {
            let t = "Gajab!"; let m = "Speed sahi hai bhai!";
            if (data.utc === 100) { t="Century!"; m="100 poore, lunch break yaad hai na?"; }
            else if (data.utc === 310) { t="TARGET!"; m="310 Delivered! System phaad diya."; confetti(); }
            else if (data.utc > 310) { t="Sher!"; m="Promotion bhi toh chaiye na mere bhai!"; }
            showToast(t, m);
            if(data.utc % 15 === 0) confetti({particleCount: 40, origin:{y:0.8}});
        }

        function save() {
            localStorage.setItem('rta_v4', JSON.stringify(data));
            updateUI();
        }

        function updateUI() {
            document.getElementById('utcDisp').innerText = data.utc;
            document.getElementById('eDisp').innerText = data.email;
            document.getElementById('cDisp').innerText = data.call;
            
            let hrs = (Date.now() - data.start) / 3600000;
            document.getElementById('cph-val').innerText = hrs > 0 ? Math.round(data.utc / hrs) : 0;
            
            if (!breakInterval) {
                document.getElementById('ticker-text').innerText = `STATUS: WORKING | REMAINING: ${data.target - data.utc}`;
            }
        }

        function showToast(t, m) {
            const toast = document.getElementById('toast');
            document.getElementById('tTitle').innerText = t;
            document.getElementById('tMsg').innerText = m;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        function downloadReport() {
            let csv = `Metric,Count\nActual Work (UTC),${data.utc}\nEmail Reschedule,${data.email}\nCall/VM Reschedule,${data.call}\nAvg CPH,${document.getElementById('cph-val').innerText}`;
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `UPS_Report_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        function resetAll() { if(confirm("Saara data clear kar dein?")) { localStorage.clear(); location.reload(); } }
        
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        
        updateUI();
    </script>
</body>
</html>
